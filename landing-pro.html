<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cargando...</title>
<meta property="og:title" id="og-title" content="">
<meta property="og:description" id="og-desc" content="">
<meta property="og:image" id="og-image" content="">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #ff2d78;
    --bg: #080810;
    --bg2: #0f0f1a;
    --text: #f0f0f5;
    --muted: #555566;
    --border: rgba(255,255,255,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; overflow-x:hidden; }

  /* LOADING */
  #loading { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:999; flex-direction:column; gap:10px; }
  .ld { width:8px; height:8px; border-radius:50%; background:var(--accent); display:inline-block; animation:ldp 1.2s ease-in-out infinite; }
  .ld:nth-child(2){ animation-delay:.2s; } .ld:nth-child(3){ animation-delay:.4s; }
  .ld-row { display:flex; gap:8px; }
  @keyframes ldp { 0%,100%{opacity:.2;transform:scale(.8)} 50%{opacity:1;transform:scale(1.3)} }

  /* ERROR */
  #error-screen { position:fixed; inset:0; background:var(--bg); display:none; align-items:center; justify-content:center; flex-direction:column; gap:16px; text-align:center; padding:30px; }
  #error-screen.show { display:flex; }
  #error-screen h2 { font-family:'Syne',sans-serif; font-size:26px; color:var(--accent); }
  #error-screen p { font-size:13px; color:var(--muted); }

  /* APP */
  #app { display:none; }

  /* HERO */
  .hero { position:relative; min-height:100dvh; display:flex; flex-direction:column; justify-content:flex-end; overflow:hidden; }
  .hero-media { position:absolute; inset:0; z-index:0; }
  .hero-media img, .hero-media video { width:100%; height:100%; object-fit:cover; }
  .hero-overlay { position:absolute; inset:0; background:linear-gradient(to bottom, rgba(8,8,16,0.2) 0%, rgba(8,8,16,0.95) 100%); z-index:1; }
  .hero-content { position:relative; z-index:2; padding:40px 24px 48px; }
  .hero-logo { width:52px; height:52px; border-radius:50%; object-fit:cover; border:2px solid rgba(255,255,255,0.15); margin-bottom:20px; display:block; }
  .hero-tag { font-size:10px; font-weight:500; letter-spacing:3px; color:var(--accent); text-transform:uppercase; margin-bottom:10px; }
  .hero-title { font-family:'Syne',sans-serif; font-size:clamp(32px,9vw,52px); font-weight:800; line-height:1.05; margin-bottom:12px; }
  .hero-subtitle { font-size:15px; color:rgba(240,240,245,0.65); line-height:1.6; margin-bottom:28px; max-width:340px; }
  .hero-impact { display:inline-flex; align-items:center; gap:10px; background:rgba(255,45,120,0.12); border:1px solid rgba(255,45,120,0.3); border-radius:30px; padding:10px 18px; margin-bottom:28px; }
  .hero-impact-num { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:var(--accent); }
  .hero-impact-label { font-size:12px; color:rgba(240,240,245,0.6); line-height:1.3; }
  .hero-cta { display:block; width:100%; padding:17px; background:var(--accent); color:#fff; text-align:center; text-decoration:none; border-radius:12px; font-family:'Syne',sans-serif; font-size:16px; font-weight:700; letter-spacing:0.5px; box-shadow:0 8px 30px rgba(255,45,120,0.35); animation:ctaPulse 2.5s ease-in-out infinite; }
  @keyframes ctaPulse { 0%,100%{box-shadow:0 8px 30px rgba(255,45,120,0.35)} 50%{box-shadow:0 8px 50px rgba(255,45,120,0.6)} }
  .hero-cta-sub { text-align:center; font-size:11px; color:var(--muted); margin-top:10px; }

  /* SECTIONS */
  section { padding:48px 24px; border-top:1px solid var(--border); }
  .section-tag { font-size:9px; letter-spacing:3px; color:var(--accent); text-transform:uppercase; font-weight:500; margin-bottom:10px; }
  .section-title { font-family:'Syne',sans-serif; font-size:clamp(22px,6vw,30px); font-weight:800; line-height:1.15; margin-bottom:20px; }

  /* GALERÍA */
  .gallery-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .gallery-item { border-radius:10px; overflow:hidden; aspect-ratio:4/5; background:var(--bg2); }
  .gallery-item img { width:100%; height:100%; object-fit:cover; display:block; }

  /* BENEFICIOS */
  .benefits-list { display:flex; flex-direction:column; gap:14px; }
  .benefit-item { display:flex; gap:14px; align-items:flex-start; padding:16px; background:var(--bg2); border-radius:12px; border:1px solid var(--border); }
  .benefit-icon { font-size:22px; flex-shrink:0; margin-top:2px; }
  .benefit-text { font-size:14px; color:rgba(240,240,245,0.8); line-height:1.5; }

  /* TESTIMONIOS */
  .testimonios-list { display:flex; flex-direction:column; gap:14px; }
  .testimonio-card { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:18px; }
  .testimonio-header { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .testimonio-avatar { width:42px; height:42px; border-radius:50%; object-fit:cover; background:var(--muted); flex-shrink:0; }
  .testimonio-name { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; }
  .testimonio-result { font-size:11px; color:var(--accent); font-weight:500; }
  .testimonio-text { font-size:13px; color:rgba(240,240,245,0.65); line-height:1.6; font-style:italic; }
  .stars { color:#ffe600; font-size:12px; margin-bottom:6px; }

  /* PARA QUIÉN */
  .paraquien-box { background:linear-gradient(135deg,rgba(255,45,120,0.08),rgba(255,45,120,0.02)); border:1px solid rgba(255,45,120,0.2); border-radius:14px; padding:20px; }
  .paraquien-text { font-size:14px; color:rgba(240,240,245,0.75); line-height:1.7; }

  /* GARANTÍA */
  .garantia-box { display:flex; gap:16px; align-items:flex-start; background:var(--bg2); border-radius:14px; padding:20px; border:1px solid var(--border); }
  .garantia-icon { font-size:32px; flex-shrink:0; }
  .garantia-title { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; margin-bottom:6px; }
  .garantia-text { font-size:13px; color:rgba(240,240,245,0.6); line-height:1.6; }

  /* CTA FINAL */
  .cta-final { padding:48px 24px 64px; text-align:center; }
  .cta-final-title { font-family:'Syne',sans-serif; font-size:clamp(24px,7vw,36px); font-weight:800; line-height:1.1; margin-bottom:8px; }
  .cta-final-sub { font-size:14px; color:var(--muted); margin-bottom:28px; }
  .cta-btn { display:block; width:100%; padding:18px; background:var(--accent); color:#fff; text-decoration:none; border-radius:12px; font-family:'Syne',sans-serif; font-size:17px; font-weight:700; box-shadow:0 8px 30px rgba(255,45,120,0.35); animation:ctaPulse 2.5s ease-in-out infinite; }
  .cta-btn-calendly { background:#006bff; box-shadow:0 8px 30px rgba(0,107,255,0.35); animation:none; }
  .cta-btn-form { background:#1a1a2e; border:1px solid var(--accent); box-shadow:none; animation:none; }

  /* FORMULARIO */
  .form-wrap { display:none; margin-top:16px; background:var(--bg2); border-radius:14px; padding:20px; border:1px solid var(--border); }
  .form-wrap.show { display:block; }
  .form-wrap input, .form-wrap textarea { width:100%; background:#111; border:1px solid #333; color:#fff; border-radius:8px; padding:11px 12px; font-size:14px; font-family:'DM Sans',sans-serif; outline:none; margin-bottom:10px; }
  .form-wrap input:focus, .form-wrap textarea:focus { border-color:var(--accent); }
  .form-wrap textarea { min-height:80px; resize:vertical; }
  .form-submit { width:100%; background:var(--accent); color:#fff; border:none; border-radius:8px; padding:13px; font-family:'Syne',sans-serif; font-size:15px; font-weight:700; cursor:pointer; }
  .form-ok { font-size:12px; color:#25d366; margin-top:8px; display:none; text-align:center; }

  /* FOOTER */
  footer { padding:24px; text-align:center; border-top:1px solid var(--border); }
  footer p { font-size:11px; color:var(--muted); }

  /* FADE IN */
  .fade-in { opacity:0; transform:translateY(20px); transition:opacity .6s ease, transform .6s ease; }
  .fade-in.visible { opacity:1; transform:translateY(0); }
</style>
</head>
<body>

<div id="loading">
  <div class="ld-row"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
</div>

<div id="error-screen">
  <h2>Link inválido</h2>
  <p>No encontramos esta publicación.<br>Verificá el link con quien te lo envió.</p>
</div>

<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://nryokltlkwpzhrpmtiqz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5yeW9rbHRsa3dwemhycG10aXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMTg2MjQsImV4cCI6MjA5MzU5NDYyNH0.vT_zIOB5HjL6Y17EpXXyVamZ_ntbRXJDphJjvTlMH2U';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ICONS = ['✦','◆','▲','●','★','✺'];

function icono(i){ return ICONS[i % ICONS.length]; }

function buildCTA(d) {
  if (d.cta_tipo === 'calendly' && d.cta_url) {
    return `<a href="${d.cta_url}" target="_blank" class="cta-btn cta-btn-calendly">📅 ${d.cta_texto || 'Agendá tu llamada gratis'}</a>`;
  }
  if (d.cta_tipo === 'formulario') {
    return `
      <button class="cta-btn cta-btn-form" onclick="toggleForm(this)">📋 ${d.cta_texto || 'Quiero más información'}</button>
      <div class="form-wrap" id="contact-form">
        <input type="text" id="form-nombre" placeholder="Tu nombre">
        <input type="text" id="form-email" placeholder="Tu email o WhatsApp">
        <textarea id="form-consulta" placeholder="¿Qué querés saber?"></textarea>
        <button class="form-submit" onclick="enviarFormulario('${d.wa_num||''}','${d.titulo||''}')">ENVIAR CONSULTA</button>
        <div class="form-ok" id="form-ok">✔ Mensaje enviado. Te contactamos pronto.</div>
      </div>`;
  }
  // default: whatsapp
  const wa = d.wa_num || '';
  const msg = encodeURIComponent(d.wa_msg || `Hola! Vi tu página y quiero más información sobre ${d.titulo || 'tu servicio'}.`);
  return `<a href="https://wa.me/${wa}?text=${msg}" target="_blank" class="cta-btn">💬 ${d.cta_texto || 'Escribinos ahora'}</a>`;
}

function toggleForm(btn) {
  const f = document.getElementById('contact-form');
  f.classList.toggle('show');
}

function enviarFormulario(waNum, titulo) {
  const nombre = document.getElementById('form-nombre').value.trim();
  const email = document.getElementById('form-email').value.trim();
  const consulta = document.getElementById('form-consulta').value.trim();
  if (!nombre || !email) return;
  const msg = encodeURIComponent(`Consulta desde landing "${titulo}"\nNombre: ${nombre}\nContacto: ${email}\nMensaje: ${consulta}`);
  window.open(`https://wa.me/${waNum}?text=${msg}`, '_blank');
  document.getElementById('form-ok').style.display = 'block';
}

function render(d) {
  // CSS accent color override
  if (d.color_acento) {
    document.documentElement.style.setProperty('--accent', d.color_acento);
  }

  // Parse arrays
  const fotos = [d.foto1, d.foto2, d.foto3, d.foto4].filter(Boolean);
  const bullets = [d.bullet1, d.bullet2, d.bullet3, d.bullet4].filter(Boolean);
  const testimonios = [];
  if (d.test1_nombre) testimonios.push({ nombre:d.test1_nombre, resultado:d.test1_resultado, texto:d.test1_texto, foto:d.test1_foto });
  if (d.test2_nombre) testimonios.push({ nombre:d.test2_nombre, resultado:d.test2_resultado, texto:d.test2_texto, foto:d.test2_foto });
  if (d.test3_nombre) testimonios.push({ nombre:d.test3_nombre, resultado:d.test3_resultado, texto:d.test3_texto, foto:d.test3_foto });

  const ctaHtml = buildCTA(d);

  let html = `
  <!-- HERO -->
  <div class="hero">
    <div class="hero-media">
      ${d.hero_video
        ? `<video src="${d.hero_video}" autoplay muted loop playsinline></video>`
        : d.hero_imagen ? `<img src="${d.hero_imagen}" alt="${d.titulo||''}">` : ''}
    </div>
    <div class="hero-overlay"></div>
    <div class="hero-content fade-in">
      ${d.logo_url ? `<img class="hero-logo" src="${d.logo_url}" alt="Logo">` : ''}
      <div class="hero-tag">${d.tag || 'Destacado'}</div>
      <h1 class="hero-title">${d.titulo || ''}</h1>
      <p class="hero-subtitle">${d.subtitulo || ''}</p>
      ${d.impacto_num && d.mostrar_impacto ? `
      <div class="hero-impact">
        <div class="hero-impact-num">${d.impacto_num}</div>
        <div class="hero-impact-label">${d.impacto_label || ''}</div>
      </div>` : ''}
      ${ctaHtml}
      ${d.cta_sub ? `<div class="hero-cta-sub">${d.cta_sub}</div>` : ''}
    </div>
  </div>`;

  // GALERÍA
  if (d.mostrar_galeria && fotos.length) {
    html += `
  <section class="fade-in">
    <div class="section-tag">Galería</div>
    <h2 class="section-title">${d.galeria_titulo || 'El producto'}</h2>
    <div class="gallery-grid">
      ${fotos.map(f => `<div class="gallery-item"><img src="${f}" loading="lazy"></div>`).join('')}
    </div>
  </section>`;
  }

  // BENEFICIOS
  if (d.mostrar_beneficios && bullets.length) {
    html += `
  <section class="fade-in">
    <div class="section-tag">Beneficios</div>
    <h2 class="section-title">${d.beneficios_titulo || '¿Por qué elegirnos?'}</h2>
    <div class="benefits-list">
      ${bullets.map((b,i) => `
      <div class="benefit-item">
        <div class="benefit-icon">${icono(i)}</div>
        <div class="benefit-text">${b}</div>
      </div>`).join('')}
    </div>
  </section>`;
  }

  // TESTIMONIOS
  if (d.mostrar_testimonios && testimonios.length) {
    html += `
  <section class="fade-in">
    <div class="section-tag">Testimonios</div>
    <h2 class="section-title">${d.testimonios_titulo || 'Lo que dicen'}</h2>
    <div class="testimonios-list">
      ${testimonios.map(t => `
      <div class="testimonio-card">
        <div class="testimonio-header">
          ${t.foto ? `<img class="testimonio-avatar" src="${t.foto}" alt="${t.nombre}">` : `<div class="testimonio-avatar" style="display:flex;align-items:center;justify-content:center;font-size:18px;">👤</div>`}
          <div>
            <div class="testimonio-name">${t.nombre}</div>
            ${t.resultado ? `<div class="testimonio-result">${t.resultado}</div>` : ''}
          </div>
        </div>
        <div class="stars">★★★★★</div>
        <div class="testimonio-text">"${t.texto}"</div>
      </div>`).join('')}
    </div>
  </section>`;
  }

  // PARA QUIÉN
  if (d.mostrar_paraquien && d.paraquien_texto) {
    html += `
  <section class="fade-in">
    <div class="section-tag">Para quién</div>
    <h2 class="section-title">${d.paraquien_titulo || '¿Es para vos?'}</h2>
    <div class="paraquien-box">
      <p class="paraquien-text">${d.paraquien_texto}</p>
    </div>
  </section>`;
  }

  // GARANTÍA
  if (d.mostrar_garantia && d.garantia_texto) {
    html += `
  <section class="fade-in">
    <div class="garantia-box">
      <div class="garantia-icon">🛡️</div>
      <div>
        <div class="garantia-title">${d.garantia_titulo || 'Garantía'}</div>
        <div class="garantia-text">${d.garantia_texto}</div>
      </div>
    </div>
  </section>`;
  }

  // CTA FINAL
  html += `
  <div class="cta-final fade-in">
    <h2 class="cta-final-title">${d.cta_final_titulo || '¿Listo para dar el siguiente paso?'}</h2>
    <p class="cta-final-sub">${d.cta_final_sub || 'Sin compromisos. Sin letra chica.'}</p>
    ${ctaHtml}
  </div>

  <footer>
    <p>${d.footer_texto || `© ${new Date().getFullYear()} ${d.titulo || ''}`}</p>
  </footer>`;

  document.getElementById('app').innerHTML = html;

  // OG tags
  document.title = d.titulo || '';
  document.getElementById('og-title').setAttribute('content', d.titulo || '');
  document.getElementById('og-desc').setAttribute('content', d.subtitulo || '');
  document.getElementById('og-image').setAttribute('content', d.hero_imagen || d.logo_url || '');

  // Fade in observer
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold:0.1 });
  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
}

async function cargar() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('s');
  const id = params.get('id');
  if (!slug && !id) return mostrarError();

  let q = db.from('s2a_landings_pro').select('*');
  if (slug) q = q.eq('slug', slug);
  else q = q.eq('id', id);

  const { data, error } = await q.single();
  if (error || !data) return mostrarError();

  render(data);
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

function mostrarError() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-screen').classList.add('show');
}

cargar();
</script>
</body>
</html>
