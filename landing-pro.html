<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story2Action - Landing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07070f;
  --bg-card: #0e0e1a;
  --bg-soft: #121222;
  --text: #f5f5f7;
  --text-muted: #a1a1b2;
  --accent: #ff2d78;
  --accent-rgb: 255, 45, 120;
  --yellow: #ffe600;
  --radius: 16px;
  --radius-sm: 10px;
  --max-width: 480px;
  --shadow: 0 8px 24px rgba(0,0,0,0.4);
  --shadow-accent: 0 8px 32px rgba(var(--accent-rgb), 0.35);
  --border: 1px solid rgba(255,255,255,0.08);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

h1, h2, h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-weight: 400;
  line-height: 0.95;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}

.container {
  width: 100%;
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 20px;
}

section {
  padding: 64px 0;
  position: relative;
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}

section.in-view {
  opacity: 1;
  transform: translateY(0);
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: var(--accent);
  color: #fff;
  font-weight: 600;
  font-size: 16px;
  padding: 16px 28px;
  border-radius: 999px;
  text-decoration: none;
  border: none;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: var(--shadow-accent);
  width: 100%;
  text-align: center;
}

.btn:hover {
  transform: translateY(-2px);
  filter: brightness(1.1);
}

.btn:active {
  transform: translateY(0px);
}

.btn-pulse {
  animation: pulse 2.5s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(var(--accent-rgb), 0.7); }
  70% { box-shadow: 0 0 0 12px rgba(var(--accent-rgb), 0); }
  100% { box-shadow: 0 0 0 0 rgba(var(--accent-rgb), 0); }
}

/* Hero */
.hero {
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding-bottom: 40px;
  padding-top: 80px;
  position: relative;
  overflow: hidden;
}

.hero-media {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -2;
}

.hero-media-item {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transform: scale(1);
  transition: opacity 1.5s ease-in-out, transform 12s linear;
}

.hero-media-item.active {
  opacity: 1;
  transform: scale(1.15);
}

.hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(7,7,15,0.2) 0%, rgba(7,7,15,0.95) 85%);
  z-index: -1;
}

.hero .container {
  text-align: center;
}

.logo {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  margin: 0 auto 20px;
  border: 2px solid rgba(var(--accent-rgb), 0.5);
  box-shadow: 0 0 24px rgba(var(--accent-rgb), 0.3);
  object-fit: cover;
}

.hero-tag {
  display: inline-block;
  font-size: 12px;
  font-weight: 500;
  background: rgba(var(--accent-rgb), 0.15);
  border: var(--border);
  color: var(--accent);
  padding: 6px 14px;
  border-radius: 999px;
  margin-bottom: 16px;
  backdrop-filter: blur(8px);
}

.hero h1 {
  font-size: clamp(48px, 12vw, 72px);
  margin-bottom: 12px;
  text-shadow: 0 4px 24px rgba(0,0,0,0.5);
}

.hero-subtitle {
  font-size: 18px;
  color: var(--text-muted);
  margin-bottom: 24px;
  max-width: 360px;
  margin-left: auto;
  margin-right: auto;
}

.impact-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--yellow);
  color: var(--bg);
  font-weight: 700;
  font-size: 14px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  margin-bottom: 32px;
  box-shadow: 0 4px 16px rgba(255,230,0,0.3);
}

/* Gallery */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.gallery-item {
  aspect-ratio: 4/5;
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--bg-soft);
  border: var(--border);
}

.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
}

.gallery-item:hover img {
  transform: scale(1.05);
}

/* Section Title */
.section-title {
  font-size: 42px;
  text-align: center;
  margin-bottom: 40px;
}

.section-title span {
  color: var(--accent);
}

/* Benefits */
.benefits {
  background: var(--bg-card);
}

.benefits-grid {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.benefit-card {
  display: flex;
  gap: 16px;
  background: var(--bg-soft);
  padding: 20px;
  border-radius: var(--radius);
  border: var(--border);
}

.benefit-icon {
  flex-shrink: 0;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(var(--accent-rgb), 0.1);
  border-radius: var(--radius-sm);
  color: var(--accent);
}

.benefit-text h3 {
  font-size: 24px;
  margin-bottom: 4px;
}

.benefit-text p {
  font-size: 15px;
  color: var(--text-muted);
}

/* Stats */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  text-align: center;
}

.stat-item {
  background: rgba(var(--accent-rgb), 0.08);
  border: 1px solid rgba(var(--accent-rgb), 0.2);
  padding: 20px 12px;
  border-radius: var(--radius);
}

.stat-number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 40px;
  color: var(--accent);
  line-height: 1;
}

.stat-label {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Testimonials */
.testimonials {
  background: var(--bg-card);
}

.testimonials-grid {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.testimonial-card {
  background: var(--bg-soft);
  padding: 24px;
  border-radius: var(--radius);
  border: var(--border);
}

.testimonial-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 16px;
}

.testimonial-avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  object-fit: cover;
}

.testimonial-name {
  font-weight: 600;
  font-size: 16px;
}

.testimonial-result {
  font-size: 14px;
  color: var(--accent);
  font-weight: 500;
}

.testimonial-text {
  font-style: italic;
  font-size: 15px;
  color: var(--text-muted);
  margin-bottom: 16px;
}

.testimonial-stars {
  color: var(--yellow);
  font-size: 18px;
  letter-spacing: 2px;
}

/* For Who */
.forwho-box {
  background: var(--bg-soft);
  border: 2px solid var(--accent);
  border-radius: var(--radius);
  padding: 32px 24px;
  text-align: center;
  box-shadow: var(--shadow-accent);
}

.forwho-box h3 {
  font-size: 36px;
  margin-bottom: 12px;
  color: var(--accent);
}

.forwho-box p {
  font-size: 16px;
  color: var(--text-muted);
  max-width: 340px;
  margin: 0 auto;
}

/* Guarantee */
.guarantee {
  background: var(--bg-card);
}

.guarantee-card {
  background: var(--bg-soft);
  border: var(--border);
  border-radius: var(--radius);
  padding: 28px 24px;
  text-align: center;
}

.guarantee-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 56px;
  height: 56px;
  background: rgba(var(--accent-rgb), 0.1);
  color: var(--accent);
  border-radius: 50%;
  margin: 0 auto 16px;
}

.guarantee-card h3 {
  font-size: 28px;
  margin-bottom: 8px;
}

.guarantee-card p {
  font-size: 15px;
  color: var(--text-muted);
}

/* Final CTA */
.final-cta {
  text-align: center;
}

.final-cta h2 {
  font-size: 48px;
  margin-bottom: 12px;
}

.final-cta p {
  font-size: 17px;
  color: var(--text-muted);
  margin-bottom: 32px;
}

/* Form */
.inline-form {
  background: var(--bg-soft);
  padding: 24px;
  border-radius: var(--radius);
  border: var(--border);
  display: none;
  flex-direction: column;
  gap: 12px;
  margin-top: 20px;
}

.inline-form.active {
  display: flex;
}

.inline-form input {
  width: 100%;
  background: var(--bg-card);
  border: var(--border);
  color: var(--text);
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
}

.inline-form input:focus {
  outline: 2px solid var(--accent);
  border-color: transparent;
}

/* Footer */
.footer {
  padding: 40px 20px;
  text-align: center;
  font-size: 13px;
  color: var(--text-muted);
  border-top: var(--border);
}

.hidden {
  display: none !important;
}
@keyframes ldp{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.3)}}
</style>

<div id="loading" style="position:fixed;inset:0;background:#07070f;display:flex;align-items:center;justify-content:center;z-index:999;">
  <div style="display:flex;gap:8px;">
    <div style="width:8px;height:8px;border-radius:50%;background:#ff2d78;animation:ldp 1.2s ease-in-out infinite;"></div>
    <div style="width:8px;height:8px;border-radius:50%;background:#ff2d78;animation:ldp 1.2s ease-in-out .2s infinite;"></div>
    <div style="width:8px;height:8px;border-radius:50%;background:#ff2d78;animation:ldp 1.2s ease-in-out .4s infinite;"></div>
  </div>
</div>
<div id="error-screen" style="display:none;position:fixed;inset:0;background:#07070f;align-items:center;justify-content:center;flex-direction:column;gap:16px;text-align:center;padding:30px;">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:#ff2d78;">Link inválido</div>
  <div style="font-size:13px;color:#555;">No encontramos esta publicación.</div>

<main id="app" style="display:none;"></main>

<script>
function hexToRgb(hex) {
  const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : "255, 45, 120";
}

function renderPage(data) {
  if (data.color_acento) {
    document.documentElement.style.setProperty('--accent', data.color_acento);
    document.documentElement.style.setProperty('--accent-rgb', hexToRgb(data.color_acento));
  }

  const app = document.getElementById('app');
  let html = '';

  // Hero
  if (data.sections.hero) {
    html += `
    <section class="hero" id="hero">
      <div class="hero-media">
        ${(data.heroMedia||[]).map((src, i) => `<img src="${src}" class="hero-media-item ${i === 0 ? 'active' : ''}" alt="Hero background ${i+1}">`).join('')}
      </div>
      <div class="container">
        ${data.hero.logo ? `<img src="${data.hero.logo}" alt="Logo" class="logo">` : ""}
        <div class="hero-tag">${data.hero.tag}</div>
        <h1>${data.hero.h1}</h1>
        <p class="hero-subtitle">${data.hero.subtitle}</p>
        ${data.hero.impact_badge ? `<div class="impact-badge">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M13 10h7l-9 13v-9H4l9-13v9z"/></svg>
          ${data.hero.impact_text}
        </div>` : ''}
        <a id="hero-cta-btn" href="#" class="btn btn-pulse" onclick="handleCTA(event)">${data.hero.cta_text}</a>

      </div>
    </section>`;
  }

  // Gallery
  if (data.sections.gallery) {
    html += `
    <section class="gallery" id="gallery">
      <div class="container">
        <div class="gallery-grid">
          ${(data.gallery||[]).filter(Boolean).slice(0,4).map(src => `<div class="gallery-item"><img src="${src}" alt="Gallery image" loading="lazy"></div>`).join('')}
        </div>
      </div>
    </section>`;
  }

  // Benefits
  if (data.sections.benefits) {
    html += `
    <section class="benefits" id="benefits">
      <div class="container">
        <h2 class="section-title">${data.benefits.title}</h2>
        <div class="benefits-grid">
          ${(data.benefits.items||[]).map(item => `
            <div class="benefit-card">
              <div class="benefit-icon">${item.icon}</div>
              <div class="benefit-text">
                <h3>${item.title}</h3>
                <p>${item.text}</p>
              </div>
            </div>`).join('')}
        </div>
      </div>
    </section>`;
  }

  // Stats
  if (data.sections.stats) {
    html += `
    <section class="stats" id="stats">
      <div class="container">
        <div class="stats-grid">
          ${(data.stats||[]).map(stat => `
            <div class="stat-item">
              <div class="stat-number">${stat.number}</div>
              <div class="stat-label">${stat.label}</div>
            </div>`).join('')}
        </div>
      </div>
    </section>`;
  }

  // Testimonials
  if (data.sections.testimonials) {
    html += `
    <section class="testimonials" id="testimonials">
      <div class="container">
        <h2 class="section-title">Client <span>Wins</span></h2>
        <div class="testimonials-grid">
          ${(data.testimonials||[]).map(t => `
            <div class="testimonial-card">
              <div class="testimonial-header">
                <img src="${t.avatar}" alt="${t.name}" class="testimonial-avatar">
                <div>
                  <div class="testimonial-name">${t.name}</div>
                  <div class="testimonial-result">${t.result}</div>
                </div>
              <p class="testimonial-text">"${t.text}"</p>
              <div class="testimonial-stars">${'★'.repeat(t.stars)}</div>
            </div>`).join('')}
        </div>
      </div>
    </section>`;
  }

  // For Who
  if (data.sections.forwho) {
    html += `
    <section class="forwho" id="forwho">
      <div class="container">
        <div class="forwho-box">
          <h3>${data.forwho.title}</h3>
          <p>${data.forwho.text}</p>
        </div>
      </div>
    </section>`;
  }

  // Guarantee
  if (data.sections.guarantee) {
    html += `
    <section class="guarantee" id="guarantee">
      <div class="container">
        <div class="guarantee-card">
          <div class="guarantee-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
          <h3>${data.guarantee.title}</h3>
          <p>${data.guarantee.text}</p>
        </div>
      </div>
    </section>`;
  }

  // Final CTA
  if (data.sections.finalcta) {
    html += `
    <section class="final-cta" id="finalcta">
      <div class="container">
        <h2>${data.finalcta.h2}</h2>
        <p>${data.finalcta.subtitle}</p>
        <a href="#" class="btn btn-pulse" onclick="handleCTA(event)">${data.finalcta.cta_text}</a>
      </div>
    </section>`;
  }

  // Footer
  if (data.sections.footer) {
    html += `
    <footer class="footer" id="footer">
      <div class="container">
        ${data.footer}
      </div>
    </footer>`;
  }

  app.innerHTML = html;
  initInteractions();
}

function initInteractions() {
  // Fade in on scroll
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('in-view');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });

  // sections observed globally after render

  // Hero Ken Burns + Crossfade
  const heroImages = document.querySelectorAll('.hero-media-item');
  if (heroImages.length > 1) {
    let current = 0;
    setInterval(() => {
      heroImages[current].classList.remove('active');
      current = (current + 1) % heroImages.length;
      heroImages[current].classList.add('active');
    }, 6000);
  }

  // CTA Handler
  function handleCTA() {
    const mode = data.cta.mode;
    const form = document.getElementById('inlineForm');
    
    if (mode === 'whatsapp') {
      const msg = encodeURIComponent(data.cta.whatsapp_message);
      window.open(`https://wa.me/${data.cta.whatsapp_number}?text=${msg}`, '_blank');
    } else if (mode === 'calendly') {
      window.open(data.cta.calendly_url, '_blank');
    } else if (mode === 'form') {
      if (form) {
        form.classList.toggle('active');
        if (form.classList.contains('active')) {
          form.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }
    }
  }

  document.querySelectorAll('.cta-trigger').forEach(btn => {
    btn.addEventListener('click', handleCTA);
  });

  // Form submit
  const form = document.getElementById('inlineForm');
  if (form) {
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Application submitted! We will contact you soon.');
      form.reset();
      form.classList.remove('active');
    });
  }
}

// renderPage called from cargar() after Supabase data loads
</script>

      d.test1_nombre && { avatar:d.test1_foto||'', name:d.test1_nombre, result:d.test1_resultado||'', text:d.test1_texto||'', stars:5 },
      d.test2_nombre && { avatar:'', name:d.test2_nombre, result:d.test2_resultado||'', text:d.test2_texto||'', stars:5 },
      d.test3_nombre && { avatar:'', name:d.test3_nombre, result:d.test3_resultado||'', text:d.test3_texto||'', stars:5 },
    ].filter(Boolean),
    forwho: { title: d.paraquien_titulo||'¿Es para vos?', text: d.paraquien_texto||'' },
    guarantee: { title: d.garantia_titulo||'Garantía', text: d.garantia_texto||'' },
    finalcta: {
      h2: d.cta_final_titulo || '¿Listo para dar el siguiente paso?',
      subtitle: d.cta_final_sub || 'Sin compromiso. Sin letra chica.',
      cta_text: d.cta_texto || 'Contactanos ahora',
    },
    footer: d.footer_texto || `© ${new Date().getFullYear()} ${d.titulo||''}`,
    cta: {
      mode: d.cta_tipo || 'whatsapp',
      whatsapp_number: d.wa_num || '',
      whatsapp_message: d.wa_msg || `Hola! Vi tu página sobre ${d.titulo||'tu servicio'} y quiero más info.`,
      calendly_url: d.cta_url || '',
    }
  };
}

let _cta = {};

function handleCTA(e) {
  e.preventDefault();
  if (_cta.mode === 'calendly' && _cta.calendly_url) {
    window.open(_cta.calendly_url, '_blank');
  } else if (_cta.mode === 'form') {
    const f = document.getElementById('contact-form');
    if (f) { f.style.display = f.style.display === 'none' ? 'block' : 'none'; }
  } else {
    const msg = encodeURIComponent(_cta.whatsapp_message || 'Hola! Vi tu página y quiero más info.');
    window.open('https://wa.me/' + (_cta.whatsapp_number || '') + '?text=' + msg, '_blank');
  }
}


const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('animate-in');
      observer.unobserve(entry.target);
    }
  });
});

async function cargar() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('s');
  const id = params.get('id');
  const loading = document.getElementById('loading');
  const errScreen = document.getElementById('error-screen');

  if (!slug && !id) {
    if(loading) loading.style.display='none';
    if(errScreen) { errScreen.style.display='flex'; }
    return;
  }

  let q = db.from('s2a_landings_pro').select('*');
  if (slug) q = q.eq('slug', slug); else q = q.eq('id', id);
  const { data: row, error } = await q.single();

  if (error || !row) {
    if(loading) loading.style.display='none';
    if(errScreen) { errScreen.style.display='flex'; } if(loading) loading.style.display='none';
    return;
  }

  // OG tags
  document.title = row.titulo || '';

  const data = buildData(row);
  _cta = data.cta;
  renderPage(data);
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
  setTimeout(() => {
    document.querySelectorAll('section').forEach(s => observer.observe(s));
  }, 100);
}

cargar();
